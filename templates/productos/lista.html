{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Gestión de Productos</h2>
    <a href="/productos/nuevo" class="btn btn-primary mb-3">+ Nuevo Producto</a>
    <a href="/productos/reporte_pdf" class="btn btn-danger mb-3">📄 Reporte PDF</a>
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Cantidad</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for p in productos %}
            <tr>
                <td>{{ p['id'] }}</td>
                <td>{{ p['nombre'] }}</td>
                <td>${{ p['precio'] }}</td>
                <td>{{ p['cantidad'] }}</td>
                <td>
                    <a href="/productos/editar/{{ p['id'] }}" class="btn btn-warning btn-sm">Editar</a>
                    <a href="/productos/eliminar/{{ p['id'] }}" class="btn btn-danger btn-sm"
                       onclick="return confirm('¿Eliminar este producto?')">Eliminar</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
