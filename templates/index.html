{% extends "base.html" %}

{% block content %}

<h2>Agregar Producto</h2>

<form action="/agregar" method="post">
    <input type="text" name="nombre" placeholder="Nombre" required>
    <input type="number" step="0.01" name="precio" placeholder="Precio" required>
    <input type="number" name="cantidad" placeholder="Cantidad" required>
    <button type="submit">Agregar</button>
</form>

<hr>

<h2>Productos en Inventario</h2>

<table border="1">
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Precio</th>
<th>Cantidad</th>
<th>Acciones</th>
</tr>

{% for p in productos %}
<tr>
<td>{{ p.id }}</td>
<td>{{ p.nombre }}</td>
<td>{{ p.precio }}</td>
<td>{{ p.cantidad }}</td>

<td>
<a href="/editar/{{p.id}}">Editar</a> |
<a href="/eliminar/{{p.id}}">Eliminar</a>
</td>

</tr>
{% endfor %}

</table>

<hr>

<h2>Guardar en Archivos</h2>

<form action="/guardar_txt" method="post">
    <input name="nombre" placeholder="Nombre">
    <button type="submit">Guardar TXT</button>
</form>

<form action="/guardar_json" method="post">
    <input name="nombre" placeholder="Nombre">
    <button type="submit">Guardar JSON</button>
</form>

<form action="/guardar_csv" method="post">
    <input name="nombre" placeholder="Nombre">
    <button type="submit">Guardar CSV</button>
</form>

<br><br>

<a href="/datos">Ver Datos Guardados</a>

{% endblock %}
